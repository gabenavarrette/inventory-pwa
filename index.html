<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Household Inventory & Budget</title>
    <style>
        /* We will add our CSS styles here in the next step */
    </style>
</head>
<body>

    <header class="app-header">
        <h1>PantryPilot</h1>
        <div id="connection-status" class="status-badge loading">Connecting...</div>
    </header>

    <main class="app-container">

        <section id="view-inventory" class="app-view active">
            <nav id="location-tabs" class="tabs-container">
                </nav>

            <div id="inventory-list" class="items-list">
                <p class="placeholder-text">Select a location to start counting...</p>
            </div>

            <div class="action-container">
                <button id="btn-save-inventory" class="btn btn-primary" disabled>Save Current Location</button>
            </div>
        </section>

        <section id="view-orders" class="app-view">
            <h2>Dynamic Order Guide</h2>
            <div id="budget-summary" class="budget-card">
                <h3>Estimated Total: <span id="total-cost">$0.00</span></h3>
                <div class="progress-bar-container">
                    <div id="budget-progress" class="progress-bar" style="width: 0%"></div>
                </div>
            </div>
            
            <div id="order-guide-list">
                <p class="placeholder-text">Complete your inventory check to generate your order list.</p>
            </div>
        </section>

        <section id="view-settings" class="app-view">
            <h2>System Settings</h2>
            <div class="card">
                <h3>Database Info</h3>
                <p>Items Tracked: <span id="stat-items">0</span></p>
                <p>Registered Vendors: <span id="stat-vendors">0</span></p>
                <button id="btn-sync" class="btn">Force Database Refresh</button>
            </div>
        </section>

    </main>

    <nav class="bottom-nav">
        <button class="nav-item active" data-target="view-inventory">
            <span class="nav-icon">📋</span>
            <span class="nav-label">Inventory</span>
        </button>
        <button class="nav-item" data-target="view-orders">
            <span class="nav-icon">🛒</span>
            <span class="nav-label">Order Guide</span>
        </button>
        <button class="nav-item" data-target="view-settings">
            <span class="nav-icon">⚙️</span>
            <span class="nav-label">Settings</span>
        </button>
    </nav>

    <script>
        // We will write the app logic here
    </script>
</body>
</html>
