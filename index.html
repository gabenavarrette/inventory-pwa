<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Household Inventory & Budget</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="container">
        <hgroup>
            <h1>PantryPilot</h1>
            <p id="connection-status">Connecting to database...</p>
        </hgroup>
    </header>

    <main class="container">

        <section id="view-inventory" class="app-view active">
            <nav id="location-tabs" aria-label="Location tabs"></nav>

            <div id="inventory-list">
                <p class="loading-placeholder">Select a location to start counting...</p>
            </div>

            <button id="btn-save-inventory" class="primary" disabled>Save Location Count</button>
        </section>

        <section id="view-orders" class="app-view">
            <h2>Dynamic Order Guide</h2>
            
            <article id="budget-summary">
                <h3>Estimated Total: <span id="total-cost">$0.00</span></h3>
                <progress id="budget-progress" value="0" max="100"></progress>
            </article>
            
            <div id="order-guide-list">
                <p>Complete your inventory check to generate your order list.</p>
            </div>
        </section>

        <section id="view-settings" class="app-view">
            <h2>System Settings</h2>
            <article>
                <h3>Database Metrics</h3>
                <p>Items Tracked: <span id="stat-items">0</span></p>
                <p>Registered Vendors: <span id="stat-vendors">0</span></p>
                <button id="btn-sync" class="outline">Force Database Refresh</button>
            </article>
        </section>

    </main>

    <nav class="bottom-nav">
        <button class="nav-item active" data-target="view-inventory">
            <span class="nav-icon">📋</span>
            <span class="nav-label">Inventory</span>
        </button>
        <button class="nav-item" data-target="view-orders">
            <span class="nav-icon">🛒</span>
            <span class="nav-label">Orders</span>
        </button>
        <button class="nav-item" data-target="view-settings">
            <span class="nav-icon">⚙️</span>
            <span class="nav-label">Settings</span>
        </button>
    </nav>

    <script src="app.js"></script>

</body>
</html>
